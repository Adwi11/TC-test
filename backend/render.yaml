services:
  - type: web
    name: resume-agent-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resume-agent-db
          property: connectionString
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        value: https://ollama.com
      - key: EXTRACTION_MODEL
        value: gpt-oss:120b-cloud
      - key: AGENT_MODEL
        value: gpt-oss:120b-cloud
      - key: VISION_MODEL
        value: qwen3-vl:235b-cloud
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: onboarding@resend.dev
      - key: MAX_UPLOAD_MB
        value: 10
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false

databases:
  - name: resume-agent-db
    plan: free
    databaseName: resume_agent
    user: resume_agent
