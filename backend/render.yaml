services:
  - type: web
    name: resume-agent-api
    runtime: python
    plan: free
    rootDir: backend
    aptPackages:
      - tesseract-ocr
      - poppler-utils
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        fromDatabase:
          name: resume-agent-db
          property: connectionString
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        value: https://ollama.com
      - key: EXTRACTION_MODEL
        value: gpt-oss:120b-cloud
      - key: AGENT_MODEL
        value: gpt-oss:120b-cloud
      - key: VISION_MODEL
        value: qwen3-vl:235b-cloud
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: MAX_UPLOAD_MB
        value: 10
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: resume-agent-db
    plan: free
    databaseName: resume_agent
    user: resume_agent
